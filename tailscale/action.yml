name: "Connect Tailscale"
description: "Wrapper around the official tailscale action to add support for containers and ssh connections"
inputs:
  oauth-client-id:
    description: "This is your Tailscale OAuth/OIDC Client ID."
    required: true
  oauth-secret:
    description: "If using an OAuth trust credential from Tailscale this is your Tailscale OAuth Client Secret."
    required: false
  oidc-audience:
    description: "If using an OIDC trust credential from Tailscale this is your aud claim."
    required: false
  tags:
    description: "Comma separated list of Tags to be applied to nodes. The Tailscale trust credential must have permission to apply these tags."
    required: true
  args:
    description: "Optional additional arguments to `tailscale up`"
    required: false
    default: ""
  hostname:
    description: "Fixed hostname to use."
    required: false
    default: ""
  userspace-networking:
    description: "Use userspace networking mode (--tun=userspace-networking). Required on runners that don't support TUN devices. When false, kernel TUN is used and traffic routes normally."
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Install deps
      shell: sh
      run: |
        # If running as root, then don't use sudo
        if [ "$(id -u)" -eq 0 ]; then
            SUDO=""
        else
            SUDO=$(command -v sudo || echo "")
        fi
        ( command -v apk && ${SUDO} apk add bash coreutils curl netcat-openbsd openssh-client sudo ) || true
        ( command -v apt-get && ${SUDO} apt-get update && ${SUDO} apt-get install -y curl netcat-openbsd openssh-client sudo ) || true

    - name: Validate Tailscale trust credential inputs
      shell: sh
      env:
        OAUTH_SECRET: ${{ inputs.oauth-secret }}
        OIDC_AUDIENCE: ${{ inputs.oidc-audience }}
      run: |
        if [ -n "$OAUTH_SECRET" ] && [ -n "$OIDC_AUDIENCE" ]; then
          echo "::error::Provide either 'oauth-secret' or 'oidc-audience', not both."
          exit 1
        fi
        if [ -z "$OAUTH_SECRET" ] && [ -z "$OIDC_AUDIENCE" ]; then
          echo "::error::One of 'oauth-secret' or 'oidc-audience' must be provided."
          exit 1
        fi

    - name: Tailscale (OAuth)
      if: inputs.oauth-secret != ''
      uses: tailscale/github-action@v4
      with:
        oauth-client-id: ${{ inputs.oauth-client-id }}
        oauth-secret: ${{ inputs.oauth-secret }}
        tags: ${{ inputs.tags }}
        args: ${{ inputs.args }}
        tailscaled-args: ${{ inputs.userspace-networking == 'true' && '--tun=userspace-networking --socks5-server=localhost:1055' || '' }}
        hostname: ${{ inputs.hostname }}

    - name: Tailscale (OIDC)
      if: inputs.oidc-audience != ''
      uses: tailscale/github-action@v4
      with:
        oauth-client-id: ${{ inputs.oauth-client-id }}
        audience: ${{ inputs.oidc-audience }}
        tags: ${{ inputs.tags }}
        args: ${{ inputs.args }}
        tailscaled-args: ${{ inputs.userspace-networking == 'true' && '--tun=userspace-networking --socks5-server=localhost:1055' || '' }}
        hostname: ${{ inputs.hostname }}

    - name: Add SSH Proxy Config
      if: inputs.userspace-networking == 'true'
      shell: sh
      run: |
        mkdir -p ~/.ssh
        echo -e "Host 100.*\n    ProxyCommand /usr/bin/nc -X 5 -x 127.0.0.1:1055 %h %p\n    StrictHostKeyChecking no\n" >> ~/.ssh/config
        echo -e "Host ip-10-*\n    ProxyCommand /usr/bin/nc -X 5 -x 127.0.0.1:1055 %h %p\n    StrictHostKeyChecking no\n" >> ~/.ssh/config
        chmod 0700 ~/.ssh
        chmod 0600 ~/.ssh/config

    # GitHub sets $HOME to /github/home, but doesn't update /etc/passwd
    # OpenSSH looks in /etc/passwd FIRST and ignores $HOME if a home dir is set in passwd
    # This updates /etc/passwd to match $HOME
    - name: Fix /etc/passwd file for alternate $HOME path
      shell: sh
      run: |
        # If running as root, then don't use sudo
        if [ "$(id -u)" -eq 0 ]; then
            SUDO=""
        else
            SUDO=$(command -v sudo || echo "")
        fi
        CURRENT_USER=$(id -un)
        CURRENT_HOME_IN_PASSWD=$(getent passwd "$CURRENT_USER" | cut -d: -f6)
        if [ "$CURRENT_HOME_IN_PASSWD" != "$HOME" ]; then
            ${SUDO} sed -i "s~${CURRENT_USER}:${CURRENT_HOME_IN_PASSWD}~${CURRENT_USER}:${HOME}~g" /etc/passwd
        fi
